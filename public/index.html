<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Writing Blog</title>
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.ico">
    <link rel="stylesheet" href="./assets/css/reset.css">
    <link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>
    <div class="container" id="auth-container">
        <h2>Register</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="register()">Register</button>
        <hr>
        <h2>Login</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div class="container hidden" id="app-container">
        <h2>Welcome</h2>
        <button onclick="logout()">Logout</button>
        <hr>
        <div id="create-post-general-container" class="">
            <h2>Create a Post</h2>
            <input type="text" id="post-title" placeholder="Title">
            <textarea id="post-content" placeholder="Content"></textarea>
            <!-- Category selector -->
            <select id="post-category">
                <option value="">Select a category</option>
            </select>
            <!-- End Category selector -->
            <button onclick="createPost()">Submit Post</button>
        </div>
        <div id="create-post-user-container" class="hidden">
            <h2>Create a Post</h2>
            <input type="text" id="post-title" placeholder="Title">
            <textarea id="post-content" placeholder="Content"></textarea>
            <!-- Category selector -->
            <select id="post-category">
                <option value="">Select a category</option>
            </select>
            <!-- End Category selector -->
            <button onclick="fetchUserPosts()">Submit Post</button>
        </div>
        <hr>
        <h2>Posts</h2>
        <h3>Welcome click here to see and edit your posts</h3>
        <button onclick="fetchUserPosts()">Load Your Posts</button>
        <!-- Posts will be displayed here -->
        <div id="posts" class=""></div>
        <div id="edit-post-container" class="hidden">
            <h2>Edit Post</h2>
            <input type="text" id="edit-post-title" placeholder="Title">
            <textarea id="edit-post-content" placeholder="Content"></textarea>
            <!-- Edit Category selector -->
            <select id="edit-post-category">
                <option value="">Select a category</option>
            </select>
            <!-- End Edit Category selector -->
            <button data-id="" onclick="submitEdit()" id="submit-edit-btn">Submit Edit</button>
        </div>
    </div>
    <script src="./assets/js/script.js"></script>
</body>

</html>
